services:
  - type: web
    name: invoice-management-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://your-netlify-app.netlify.app  # update after Netlify deploy
      - key: ENVIRONMENT
        value: production
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1              # persists database.db between deploys
